<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X SOL Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>

  <div class="card">
    <img src="logo0.png" alt="Valley X Logo">

    <h1>Valley X SOL Dashboard</h1>

    <button id="connect">Connect Phantom</button>

    <div class="info" id="walletInfo" style="display:none;">
      <p><strong>Wallet:</strong></p>
      <p class="small" id="address"></p>

      <p><strong>SOL Balance:</strong>
        <span id="balance">0</span>
      </p>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
